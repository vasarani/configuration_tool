- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform 
    tagList: 
      name: Ansible
      project: Roboshop
      component: Catalogue

  tasks: 
    - name: greeting
      ansible.builtin.debug:
        msg: "Hi Vasa Rani, {{ GREETING | default('Very Good Morning') }}"

    - name: convert string to list
      ansible.builtin.debug:
        msg: "{{ topics | split(',') }}"
    - name: convert map to list 
      ansible.builtin.debug:
        msg: "{{ tags | dict2items }}"    
